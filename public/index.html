<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Restore the EchoVerse in a fast, atmospheric browser game of resonance fruits, wisps, and corruption cycles.">
    <title>Whispering Woods: EchoVerse Restoration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        :root {
            --bg-deep: #05050a;
            --bg-ink: #0b0c17;
            --accent-pink: #ff4fd8;
            --accent-cyan: #45f3ff;
            --accent-lime: #9cff57;
            --accent-gold: #ffd86b;
            --glass: rgba(15, 18, 30, 0.72);
            --glass-edge: rgba(160, 170, 255, 0.22);
            --text-primary: #f3f6ff;
            --text-muted: #b1b7d4;
            --pixel-border: #a7f0ff;
            --pixel-panel: #0f1220;
            --pixel-panel-dark: #0a0c16;
            --pixel-shadow: #05060b;
        }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(1200px 800px at 15% 10%, rgba(255, 79, 216, 0.12), transparent 60%),
                        radial-gradient(1100px 900px at 90% 10%, rgba(69, 243, 255, 0.12), transparent 55%),
                        radial-gradient(1200px 900px at 60% 90%, rgba(156, 255, 87, 0.08), transparent 55%),
                        linear-gradient(160deg, var(--bg-deep), var(--bg-ink));
            font-family: "Press Start 2P", "Courier New", monospace;
            color: var(--text-muted);
            overflow: hidden;
            letter-spacing: 0.6px;
            image-rendering: pixelated;
        }
        button:focus-visible {
            outline: 2px solid rgba(255, 216, 107, 0.9);
            outline-offset: 2px;
        }
        body::before,
        body::after {
            content: "";
            position: absolute;
            inset: -20%;
            background: conic-gradient(from 180deg, rgba(255, 79, 216, 0.06), transparent 25%, rgba(69, 243, 255, 0.06), transparent 55%, rgba(156, 255, 87, 0.05));
            filter: blur(30px);
            opacity: 0.6;
            animation: drift 18s linear infinite;
            z-index: 0;
        }
        body::after {
            animation-direction: reverse;
            opacity: 0.35;
        }
        @keyframes drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            body::before,
            body::after {
                animation: none !important;
            }
        }
        #gameContainer {
            position: relative;
            border: 4px solid var(--pixel-border);
            box-shadow:
                0 0 0 4px var(--pixel-shadow),
                0 0 0 8px #1a2036,
                0 18px 45px rgba(0,0,0,0.6);
            background: linear-gradient(180deg, var(--pixel-panel), var(--pixel-panel-dark));
            width: 100%;
            max-width: 900px;
            aspect-ratio: 800 / 600;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            overflow: hidden;
            z-index: 1;
        }
        #gameContainer::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.15),
                    rgba(0, 0, 0, 0.15) 1px,
                    transparent 1px,
                    transparent 3px
                );
            mix-blend-mode: soft-light;
            pointer-events: none;
            z-index: 2;
        }
        #gameContainer::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0.05),
                    rgba(255, 255, 255, 0.05) 1px,
                    transparent 1px,
                    transparent 4px
                );
            pointer-events: none;
            z-index: 2;
        }
        #gameHeader {
            width: 100%;
            height: 50px;
            background: linear-gradient(120deg, #11182b, #1a1220);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            border-bottom: 4px solid var(--pixel-border);
            z-index: 5;
        }
        .headerColumn {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .headerColumn.headerRight {
            align-items: flex-end;
        }
        canvas {
            display: block;
            background-color: transparent;
            width: 100%;
            height: calc(100% - 50px);
            opacity: 0;
            transition: opacity 1.2s ease-in 0.5s;
            position: relative;
            image-rendering: pixelated;
        }
        canvas.visible { opacity: 1; }
        #uiOverlay {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            height: calc(100% - 50px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease-in 0.5s;
            z-index: 10;
        }
        #uiOverlay.visible { opacity: 1; }
        #scoreDisplay {
            font-size: 16px;
            line-height: 1.5;
            color: var(--accent-gold);
            text-shadow: 0 0 12px rgba(255, 216, 107, 0.45);
            padding: 0;
            text-transform: uppercase;
        }
        #aiChallengeTimerDisplay {
            font-size: 13px;
            line-height: 1.5;
            color: #ff7b65;
            text-shadow: 0 0 12px rgba(255, 123, 101, 0.45);
            padding: 0;
            display: block;
            text-transform: uppercase;
        }
        #messageDisplayContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(145deg, #0e1220, #0a0c18);
            padding: 30px;
            border-radius: 0;
            text-shadow: 0 0 12px rgba(0,0,0,0.5);
            border: 4px solid var(--pixel-border);
            box-shadow:
                0 0 0 4px var(--pixel-shadow),
                0 10px 20px rgba(0,0,0,0.6);
            z-index: 20;
            max-width: 80%;
        }
        #messageDisplay {
            font-size: 13px;
            line-height: 1.5;
            color: #f5f5f5;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        #restartGameButton {
            background: #ffd86b;
            color: #11131b;
            padding: 10px 20px;
            border: 4px solid #11131b;
            border-radius: 0;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0 #0a0c16;
            transition: all 0.3s ease;
            pointer-events: auto;
            text-transform: uppercase;
        }
        #restartGameButton:hover {
            background: #fff0a6;
            color: #0f111a;
            transform: translate(-1px, -1px);
            box-shadow: 6px 6px 0 #0a0c16;
        }
        #onboardingScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(150deg, #091321, #0c0f1b, #070911);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 30;
            padding: 30px;
            box-sizing: border-box;
            opacity: 1;
            cursor: pointer;
        }
        #onboardingScreen.fade-out {
            opacity: 0 !important;
            transition: opacity 1s ease-out 0.5s;
            pointer-events: none;
        }
        #onboardingScreen.no-cursor { cursor: default; }
        #onboardingScreen h1 {
            font-family: "Press Start 2P", "Courier New", monospace;
            font-size: 36px;
            font-weight: 400;
            letter-spacing: 1px;
            color: #f6f2ff;
            text-shadow: 0 0 18px rgba(255, 79, 216, 0.6), 0 0 35px rgba(69, 243, 255, 0.35);
            margin-bottom: 35px;
            opacity: 0;
            transform: translateY(-20px);
            animation: titleAppear 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            animation-delay: 0.3s;
        }
        @keyframes titleAppear { to { opacity: 1; transform: translateY(0); } }
        #typewriterContainer, #fruitIntroContainer {
            margin-bottom: 30px;
            min-height: 160px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 1;
            transition: opacity 0.5s ease-out, display 0s linear 0.5s;
        }
        #typewriterContainer.hidden, #fruitIntroContainer.hidden {
            opacity: 0;
            pointer-events: none;
            display: none !important;
        }
        #fruitIntroContainer { opacity: 0; display: none; }
        #fruitIntroContainer.visible {
            opacity: 1;
            display: flex;
            transition: opacity 0.7s ease-in;
        }
        #typewriterContainer p {
            font-size: 12px;
            line-height: 1.5;
            color: #f3f6ff;
            text-shadow: 0 0 12px rgba(69, 243, 255, 0.2);
            margin-bottom: 15px;
            max-width: 700px;
            min-height: 24px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s, color 0.5s ease;
            text-transform: uppercase;
        }
        #typewriterContainer p.visible-line { opacity: 1; transform: translateY(0); }
        #typewriterContainer p.dimmed-line { opacity: 0.5; color: #a7b0d0; }
        .typewriter-cursor {
            display: inline-block;
            background-color: #FFD700;
            width: 8px;
            height: 16px;
            animation: blink 0.8s step-end infinite;
            margin-left: 2px;
            vertical-align: text-bottom;
        }
        @keyframes blink {
            from, to { background-color: transparent; }
            50% { background-color: #FFD700; }
        }
        #fruitIntroContainer h2 {
            font-size: 12px;
            line-height: 1.5;
            font-weight: bold;
            color: var(--accent-gold);
            margin-bottom: 20px;
            text-shadow: 0 0 12px rgba(255, 216, 107, 0.35);
            text-transform: uppercase;
        }
        .fruit-display-area {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            width: 100%;
            max-width: 700px;
            margin-bottom: 25px;
        }
        .fruit-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: #FFFFE0;
        }
        .fruit-visual {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-bottom: 8px;
            border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 0 12px rgba(255,255,255,0.35);
        }
        .fruit-item p {
            font-size: 12px;
            line-height: 1.5;
            margin: 4px 0;
            text-transform: uppercase;
        }
        #beginRestorationButton, #startGameButton {
            background: #45f3ff;
            color: #071018;
            padding: 12px 25px;
            border: 4px solid #071018;
            border-radius: 0;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0 #0a0c16;
            transition: all 0.3s ease;
            opacity: 0;
            transform: scale(0.7) translateY(20px);
            pointer-events: none;
            margin-top: 20px;
            text-transform: uppercase;
        }
        #beginRestorationButton.visible, #startGameButton.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
            transition: opacity 0.8s ease-out 0.3s, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s;
        }
        #beginRestorationButton:hover, #startGameButton:hover {
            background: #7cf7ff;
            color: #041018;
            transform: translate(-1px, -1px);
            box-shadow: 6px 6px 0 #0a0c16;
        }
        #beginRestorationButton.hidden, #startGameButton.hidden { opacity: 0 !important; pointer-events: none !important; display: none !important; }
        #dynamicMessageOverlay {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #0e1320;
            color: #d3f7ff;
            padding: 10px 15px;
            border-radius: 0;
            border: 3px solid #2b3550;
            box-shadow: 3px 3px 0 #0a0c16;
            font-size: 11px;
            line-height: 1.4;
            text-align: center;
            max-width: 70%;
            z-index: 25;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            pointer-events: none;
            text-transform: uppercase;
        }
        #dynamicMessageOverlay.visible { opacity: 1; }
    </style>
</head>
<body>
    <div id="gameContainer" role="application" aria-label="EchoVerse game area">
        <div id="gameHeader">
            <div class="headerColumn">
                <div id="scoreDisplay">Score: 0</div>
            </div>
            <div class="headerColumn headerRight">
                <div id="aiChallengeTimerDisplay"></div>
            </div>
        </div>
        <div id="onboardingScreen">
            <h1>EchoVerse</h1>
            <div id="typewriterContainer"></div>
            <div id="fruitIntroContainer" class="hidden">
                <h2>The Resonance Fruits</h2>
                <div class="fruit-display-area">
                    <div class="fruit-item">
                        <div class="fruit-visual" style="background-color: #DC143C; box-shadow: 0 0 15px #DC143C;"></div>
                        <p>Crimson Fruit</p> <p>+5 Points</p>
                    </div>
                    <div class="fruit-item">
                        <div class="fruit-visual" style="background-color: #FF8C00; box-shadow: 0 0 15px #FF8C00;"></div>
                        <p>Amber Fruit</p> <p>+10 Points</p>
                    </div>
                    <div class="fruit-item">
                        <div class="fruit-visual" style="background-color: #9400D3; box-shadow: 0 0 15px #9400D3;"></div>
                        <p>Violet Fruit</p> <p>+20 Points</p>
                    </div>
                </div>
            </div>
            <button id="beginRestorationButton" type="button">Learn About Fruits</button>
            <button id="startGameButton" class="hidden" type="button">Start Game</button>
        </div>
        <canvas id="gameCanvas" aria-label="EchoVerse playfield"></canvas>
        <div id="uiOverlay">
            <div id="messageDisplayContainer">
                <div id="messageDisplay" role="status" aria-live="polite"></div>
                <button id="restartGameButton" type="button">Restore More</button>
            </div>
            <div id="dynamicMessageOverlay" role="status" aria-live="polite"></div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const aiChallengeTimerDisplay = document.getElementById('aiChallengeTimerDisplay');
        const messageDisplayContainer = document.getElementById('messageDisplayContainer');
        const messageDisplay = document.getElementById('messageDisplay');
        const restartGameButton = document.getElementById('restartGameButton');
        const onboardingScreen = document.getElementById('onboardingScreen');
        const typewriterContainer = document.getElementById('typewriterContainer');
        const fruitIntroContainer = document.getElementById('fruitIntroContainer');
        const beginRestorationButton = document.getElementById('beginRestorationButton');
        const startGameButton = document.getElementById('startGameButton');
        const uiOverlay = document.getElementById('uiOverlay');
        const dynamicMessageOverlay = document.getElementById('dynamicMessageOverlay');

        const INFO_BAND_HEIGHT = 50;
        const gameContainer = document.getElementById('gameContainer');
        let gameWidth = 800;
        let gameHeight = 550;

        function updateGameDimensions() {
            let containerWidth = gameContainer.offsetWidth;
            gameWidth = containerWidth > 0 ? containerWidth : 800;
            let containerHeight = gameContainer.offsetHeight;
            gameHeight = containerHeight > INFO_BAND_HEIGHT ? containerHeight - INFO_BAND_HEIGHT : 550;

            canvas.width = gameWidth;
            canvas.height = gameHeight;
            console.log('Game dimensions updated: Container WxH', containerWidth, containerHeight, 'Canvas WxH', gameWidth, gameHeight);
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateGameDimensions();
        });
        window.addEventListener('resize', updateGameDimensions);

        var score = 0;
        var currentForestLayer = 1;
        const maxForestLayer = 8;
        const pointsPerLayer = 50;
        const winningScore = 350;
        var messageShown = false;
        var gameStarted = false;
        var gameEnded = false;
        var requestId;

        const player = { x: gameWidth / 2, y: gameHeight / 2, radius: 10, speed: 2.5, color: '#FFD700', dx: 0, dy: 0 };
        let fruits = [];
        const fruitRadius = 12;
        const numFruits = 4;
        const fruitData = {
            crimson: { name: 'Crimson Fruit', colorHex: '#DC143C', glow: 'rgba(220, 20, 60, 0.7)', points: 5, rarity: 0.6 },
            amber:   { name: 'Amber Fruit',   colorHex: '#FF8C00', glow: 'rgba(255, 140, 0, 0.7)', points: 10, rarity: 0.3 },
            violet:  { name: 'Violet Fruit',  colorHex: '#9400D3', glow: 'rgba(148, 0, 211, 0.7)', points: 20, rarity: 0.1, isLoreShard: true }
        };
        let trees = [];
        const treeCount = 75;
        const pathfinderTreeChance = 0.18;

        const AI_CHALLENGE_DURATION = 40000;
        const AI_CHALLENGE_POINTS_NEEDED = 50;
        let aiChallengeTimer = AI_CHALLENGE_DURATION;
        let scoreAtChallengeStart = 0;

        const loreFragments = [
            'Once, light flowed here like rivers of pure data...',
            'The EchoVerse sang songs of perfect code, now just whispers.',
            'Silicon leaves held starlight; now only pixelated dust remains.',
            'This was a place of balance, before Elon\'s cold logic fractured it.',
            'Each Resonance Fruit holds a memory of what was lost.',
            'The Pathfinder Glyphs are echoes of the forest\'s ancient pathways.',
            'Can you hear the silence where the data streams once roared?'
        ];
        const aiTaunts = [
            'Elon: Your efforts are... statistically insignificant.',
            'Elon: The pixels realign to my superior design.',
            'Elon: Order will be restored. My order.',
            'Elon: You cannot mend what is already optimized by entropy.',
            'Elon: This forest\'s "beauty" was an inefficient algorithm.',
            'Elon: Corruption is merely a new form of perfection.'
        ];

        let collectSound, ambientNoise, birdSynth, animalSynth1, animalSynth2, ambientMusicLoop, noiseFilter, typeCharSound, lineEndSound, buttonAppearSound, happyPianoSynth;
        let soundsReadyForOnboarding = false;
        let gameSoundsReady = false;
        var birdIntervalId = null;
        var animalIntervalId1 = null;
        var animalIntervalId2 = null;
        var endLoopInstance = null;
        let currentBirdIntervalTime = 7500;

        const onboardingLines = [
            'An AI called Elon has broken this digital forest.',
            'It\'s now just pixelated echoes of what it once was.',
            'You are a Restorer. You can fix this place.',
            'Find the glowing Resonance Fruits to heal the EchoVerse.',
            'Glowing trees, the Pathfinder Glyphs, show safe paths.',
            'Use WASD or Arrow Keys to move. But hurry, Elon is always watching.'
        ];
        let currentParagraphIndex = 0;
        let currentCharIndex = 0;
        const typingSpeed = 55;
        const interLinePause = 700;
        const preButtonPause = 1000;

        function typeCharacter() {
            if (currentParagraphIndex >= onboardingLines.length) {
                if (typewriterContainer.querySelector('.typewriter-cursor')) {
                    typewriterContainer.querySelector('.typewriter-cursor').remove();
                }
                setTimeout(() => {
                    beginRestorationButton.classList.add('visible');
                    if (soundsReadyForOnboarding && buttonAppearSound) buttonAppearSound.triggerAttackRelease('C5', '4n', Tone.now() + 0.1);
                }, preButtonPause);
                return;
            }
            let p = typewriterContainer.children?.[currentParagraphIndex];
            if (!p) {
                p = document.createElement('p');
                typewriterContainer.appendChild(p);
            }
            const textToType = onboardingLines?.[currentParagraphIndex];
            if (currentCharIndex === 0) {
                p.innerHTML = '';
                p.classList.add('visible-line');
                for (let i = 0; i < currentParagraphIndex; i++) {
                    if (typewriterContainer.children?.[i]) typewriterContainer.children?.[i].classList.add('dimmed-line');
                }
            }
            const currentTextContent = p.textContent?.replace(/.$/, '');
            if (currentCharIndex < textToType?.length) {
                p.textContent = currentTextContent + textToType?.[currentCharIndex];
                const cursorSpan = document.createElement('span');
                cursorSpan.className = 'typewriter-cursor';
                p.appendChild(cursorSpan);
                if (soundsReadyForOnboarding && typeCharSound && currentCharIndex % 2 === 0) {
                    try { typeCharSound.triggerAttackRelease('G#5', '128n', Tone.now() + 0.001); } catch (e) {}
                }
                currentCharIndex++;
                setTimeout(typeCharacter, typingSpeed);
            } else {
                p.textContent = textToType;
                if (soundsReadyForOnboarding && lineEndSound) {
                    try { lineEndSound.triggerAttackRelease('E5', '16n', Tone.now() + 0.01); } catch (e) {}
                }
                currentParagraphIndex++;
                currentCharIndex = 0;
                setTimeout(typeCharacter, interLinePause);
            }
        }

        async function initOnboardingAudio() {
            if (soundsReadyForOnboarding) return;
            if (Tone.context.state !== 'running') {
                try { await Tone.start(); console.log('Audio context started for onboarding.'); }
                catch (e) { console.error('Error starting Tone.js for onboarding:', e); return; }
            }
            typeCharSound = new Tone.MembraneSynth({ pitchDecay: 0.004, octaves: 1.5, envelope: { attack: 0.001, decay: 0.03, sustain: 0 }, volume: -32 }).toDestination();
            lineEndSound = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.005, decay: 0.15, sustain: 0.01, release: 0.1 }, volume: -24 }).toDestination();
            buttonAppearSound = new Tone.Synth({ oscillator: { type: 'fatsawtooth', count: 3, spread: 25 }, envelope: { attack: 0.02, decay: 0.3, sustain: 0.05, release: 0.2 }, volume: -20 }).toDestination();
            soundsReadyForOnboarding = true;
        }

        async function initGameAudio() {
            if (gameSoundsReady) return;
            if (Tone.context.state !== 'running') {
                try { await Tone.start(); } catch(e) { console.error('Audio context failed to start for game sounds:', e); return; }
            }
            collectSound = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.005, decay: 0.15, sustain: 0.01, release: 0.2 }, volume: -7 }).toDestination();
            ambientNoise = new Tone.Noise('brown').start();
            ambientNoise.volume.value = -40;
            noiseFilter = new Tone.AutoFilter({ frequency: '10m', baseFrequency: 70, octaves: 4.5, depth: 0.65 }).toDestination();
            ambientNoise.connect(noiseFilter);
            birdSynth = new Tone.FMSynth({ harmonicity: 1.5, modulationIndex: 2, envelope: { attack: 0.01, decay: 0.2, sustain: 0.05, release: 0.3 }, volume: -24 }).toDestination();
            animalSynth1 = new Tone.MembraneSynth({ pitchDecay: 0.02, octaves: 4, envelope: { attack: 0.01, decay: 0.5, sustain: 0.02, release: 0.4 }, volume: -20 }).toDestination();
            animalSynth2 = new Tone.PluckSynth({ attackNoise: 0.5, dampening: 6000, resonance: 0.8, volume: -18 }).toDestination();
            const finalSynth = new Tone.PolySynth(Tone.AMSynth, { harmonicity: 1.2, envelope: { attack: 2.5, decay: 1, sustain: 0.8, release: 4.5 }, volume: -14 }).toDestination();
            const reverb = new Tone.Reverb(4.5).toDestination();
            finalSynth.connect(reverb);
            ambientMusicLoop = new Tone.Pattern((time, note) => { finalSynth.triggerAttackRelease(note, '4m', time + 0.001); }, ['C3', 'Eb3', 'G3', 'Bb3', 'G3', 'D3', 'F2', 'Ab2'], 'randomWalk');
            ambientMusicLoop.interval = '2m';
            const pianoChorus = new Tone.Chorus(0.15, 3, 0.7).toDestination().start();

        function generateTrees() { trees = []; const playerSafeRadius = 120; const treeMinDist = 38; for (let i = 0; i < treeCount; i++) { let treeX, treeY, validPosition; let attempts = 0; do { validPosition = true; treeX = Math.random() * gameWidth; treeY = Math.random() * gameHeight; if (Math.hypot(treeX - player.x, treeY - player.y) < playerSafeRadius) { validPosition = false; } if (validPosition) { for (const t of trees) { if (Math.hypot(treeX - t.x, treeY - t.y) < treeMinDist) { validPosition = false; break; } } } attempts++; } while (!validPosition && attempts < 200); if (validPosition) { const isPathfinder = Math.random() < pathfinderTreeChance; trees.push({ x: treeX, y: treeY, type: isPathfinder ? 'pathfinder' : 'guardian', glowPhase: Math.random() * Math.PI * 2 }); } } }

        function checkTreeCollision(checkX, checkY, pRadius) { for (const tree of trees) { if (tree.type === 'guardian') { const treeStyle = getTreeSize(currentForestLayer || 1, tree.type); const treeCollisionRadius = Math.max(treeStyle.width, treeStyle.height) / 3.1; if (Math.hypot(checkX - tree.x, checkY - tree.y) < pRadius + treeCollisionRadius) { return true; } } } return false; }
